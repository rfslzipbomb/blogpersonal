<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Mi Portafolio</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
<header class="main-header">
    <img src="imagenes/Imagen no guardada 1.jpg" alt="Logo de mi sitio" class="logo-img">
    
    <nav class="nav-bar">
        <button class="menu-toggle" aria-label="Abrir menú">☰</button>
        <div class="nav-overlay"></div>

        <ul class="nav-menu">
            <li class="close-menu-container">
                <button class="menu-close" aria-label="Cerrar menú">✕</button>
            </li>
            <li><a href="index.html" class="nav-link">Inicio</a></li>
            <li><a href="acerca-de-mi.html" class="nav-link">Acerca de</a></li> 
            <li><a href="proyectos.html" class="nav-link">Portafolio</a></li> 
            <li><a href="blog.html" class="nav-link">Blog</a></li>
            <li><a href="contacto.html" class="nav-link active">Contacto</a></li>
        </ul>   
    </nav>

    <form class="search-form" action="#" method="GET">
        <input type="text" placeholder="Buscar..." name="search" required>
        <button type="submit" aria-label="Buscar">🔍</button>
    </form>
</header>

<main class="contacto-container">
    <div class="contacto-header">
        <h1>Enviar Mensaje</h1>
        <p>Espera una respuesta en las próximas 48 horas.</p> 
    </div>

    <form class="formulario-contacto" action="https://formspree.io/f/TU_CODIGO_AQUI" method="POST">
        
        <div class="form-group">
            <label for="nombre">Nombre completo</label>
            <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>
        </div>

        <div class="form-group">
            <label for="email">Correo electrónico</label>
            <input type="email" id="email" name="email" placeholder="tu@correo.com" required>
        </div>

        <div class="form-group">
            <label for="asunto">Asunto</label>
            <input type="text" id="asunto" name="asunto" placeholder="Motivo de tu mensaje" required>
        </div>

        <div class="form-group">
            <label for="mensaje">Mensaje</label>
            <textarea id="mensaje" name="mensaje" rows="6" placeholder="Escribe tu mensaje aquí..." required></textarea>
        </div>

        <button type="submit" class="btn-enviar">Enviar Mensaje</button>
    </form>
</main>

<script>
    const menuToggle = document.querySelector('.menu-toggle');
    const menuClose = document.querySelector('.menu-close');
    const navMenu = document.querySelector('.nav-menu');
    const navOverlay = document.querySelector('.nav-overlay');

    menuToggle.addEventListener('click', () => {
        navMenu.classList.add('open');
        navOverlay.classList.add('open');
    });

    const closeMenu = () => {
        navMenu.classList.remove('open');
        navOverlay.classList.remove('open');
    };

    menuClose.addEventListener('click', closeMenu);
    navOverlay.addEventListener('click', closeMenu);
</script>
<footer class="footer-description">
    Powered by Faith & Creativity. 2026
</footer>
</body>
</html>
